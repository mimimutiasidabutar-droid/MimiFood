<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MimiFood Bekasi - Menu Lengkap</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fcf8f5; margin: 0; padding: 15px; padding-bottom: 250px; color: #333; }
        .header { text-align: center; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(211, 47, 47, 0.1); margin-bottom: 25px; border-bottom: 5px solid #d32f2f; }
        .header h1 { margin: 0; color: #d32f2f; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        
        .menu-item { background: white; border-radius: 18px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; border: 1px solid #eee; }
        .menu-img { width: 100%; height: 220px; object-fit: cover; background: #f0f0f0; }
        .menu-content { padding: 15px; }
        .menu-title { font-size: 19px; font-weight: bold; margin: 0; color: #222; }
        .menu-desc { font-size: 13px; color: #666; margin: 8px 0; line-height: 1.4; }
        .menu-price { font-size: 18px; font-weight: bold; color: #d32f2f; margin-bottom: 12px; display: block; }
        
        .controls { display: flex; align-items: center; justify-content: space-between; background: #fff5f5; padding: 10px 15px; border-top: 1px solid #ffebeb; }
        .btn-qty { background: #d32f2f; color: white; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; }
        .qty { font-size: 20px; font-weight: bold; color: #333; }

        /* Gaya Kotak Informasi Toko */
        .info-section { background: #fff; padding: 20px; border-radius: 20px; border: 2px dashed #d32f2f; margin: 20px 0; }
        .info-section h3 { margin-top: 0; color: #d32f2f; display: flex; align-items: center; gap: 10px; }
        .info-item { margin: 10px 0; font-size: 15px; display: flex; align-items: center; gap: 10px; }

        /* Gaya Form Pengiriman */
        .form-section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-top: 20px; border: 1px solid #eee; }
        .form-section h3 { margin-top: 0; color: #d32f2f; font-size: 18px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: inherit; }

        .cart-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); max-width: 600px; margin: auto; border-radius: 30px 30px 0 0; z-index: 100; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-amount { font-size: 22px; font-weight: 900; color: #d32f2f; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; text-align: center; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 Daftar Menu MimiFood</h1>
    <p style="margin: 5px 0 0; color: #777;">Bekasi, Indonesia</p>
</div>

<div id="menu-list"></div>

<!-- BAGIAN INFORMASI TOKO YANG TADI HILANG -->
<div class="info-section">
    <h3>ℹ️ Informasi Toko</h3>
    <div class="info-item">📍 <b>Lokasi:</b> MimiFood (Bekasi)</div>
    <div class="info-item">🕒 <b>Buka:</b> 06.00 - 22.00 WIB</div>
    <div class="info-item">🚚 <b>Layanan:</b> Delivery / Ambil di tempat</div>
    <div class="info-item">🔥 <b>Kualitas:</b> Masakan fresh & dibuat saat dipesan</div>
</div>

<div class="form-section">
    <h3>📝 Data Pengiriman</h3>
    <input type="text" id="buyer-name" placeholder="Nama Lengkap Kamu">
    <input type="text" id="buyer-address" placeholder="Alamat Pengiriman (Bekasi)">
    <textarea id="order-note" placeholder="Catatan (Contoh: Gak pake jengkol, Pedas banget, dll)"></textarea>
</div>

<div class="cart-footer">
    <div class="total-row">
        <span style="font-weight: bold;">Total Pesanan:</span>
        <span class="total-amount" id="total-display">Rp 0</span>
    </div>
    <button class="btn-wa" onclick="sendWA()">🚀 Kirim Pesanan ke WhatsApp</button>
</div>

<audio id="soundAdd" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="soundRemove" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="soundSend" src="https://www.myinstants.com/media/sounds/cash-register-purchase.mp3" preload="auto"></audio>

<script>
    const menuData = [
        { id: 1, name: "Pangsit Rebus Chili Oil", price: 10000, img: "pagsitrebus.png", desc: "Pangsit lembut isian ayam premium dengan siraman chili oil pedas nampol." },
        { id: 2, name: "Pangsit Goreng Chili Oil", price: 10000, img: "pagsitgoreng.png", desc: "Sensasi renyah pangsit goreng dipadu bumbu chili oil khas MimiFood." },
        { id: 3, name: "Nasi Goreng Jengkol Spesial", price: 12000, img: "nasgor.png", desc: "Nasi goreng bumbu rempah dengan jengkol pilihan yang empuk dan gurih." },
        { id: 4, name: "Ayam Sambal Matah + Nasi", price: 18000, img: "ayamsambalmatah.png", desc: "Ayam goreng juara dengan irisan sambal matah segar yang melimpah." },
        { id: 5, name: "Ayam Sambal Terasi + Nasi", price: 18000, img: "ayamsambalterasi.png", desc: "Perpaduan ayam goreng dan sambal terasi ulek yang menggugah selera." },
        { id: 6, name: "Tori No Teba + Nasi", price: 16000, img: "torinoteba.png", desc: "Sayap ayam isi olahan daging yang gurih, disajikan dengan nasi hangat." },
        { id: 7, name: "Nasi Bakar Cumi Balado", price: 12000, img: "nasicumi.png", desc: "Nasi bakar wangi dengan isian cumi balado pedas manis." },
        { id: 8, name: "Nasi Bakar Ayam Suwir Kemangi", price: 12000, img: "nasiayamsuwir.png", desc: "Nasi bakar aroma kemangi dengan ayam suwir bumbu melimpah." },
        { id: 9, name: "Bakcang Ayam Original", price: 8000, img: "bakcangori.png", desc: "Bakcang ketan padat dengan isian ayam kecap yang bumbunya meresap." },
        { id: 10, name: "Bakcang Ayam + Tetelan", price: 15000, img: "bakcangtetelan.png", desc: "Varian bakcang mewah dengan tambahan tetelan sapi yang juicy." }
    ];

    let cart = {};

    function renderMenu() {
        const container = document.getElementById('menu-list');
        container.innerHTML = menuData.map(item => `
            <div class="menu-item">
                <img src="${item.img}" class="menu-img" onerror="this.src='https://via.placeholder.com/400x220?text=MimiFood+Bekasi'">
                <div class="menu-content">
                    <h3 class="menu-title">${item.name}</h3>
                    <p class="menu-desc">${item.desc}</p>
                    <span class="menu-price">Rp ${item.price.toLocaleString('id-ID')}</span>
                </div>
                <div class="controls">
                    <div style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
                        <button class="btn-qty" onclick="updateQty(${item.id}, -1)">-</button>
                        <span class="qty" id="qty-${item.id}">0</span>
                        <button class="btn-qty" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateQty(id, change) {
        if (!cart[id]) cart[id] = 0;
        const addSound = document.getElementById('soundAdd');
        const removeSound = document.getElementById('soundRemove');
        if (change > 0) { addSound.currentTime = 0; addSound.play().catch(e => {}); cart[id] += 1; }
        else if (change < 0 && cart[id] > 0) { removeSound.currentTime = 0; removeSound.play().catch(e => {}); cart[id] -= 1; }
        document.getElementById(`qty-${id}`).innerText = cart[id];
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        menuData.forEach(item => { if (cart[item.id]) total += item.price * cart[item.id]; });
        document.getElementById('total-display').innerText = "Rp " + total.toLocaleString('id-ID');
    }

    function sendWA() {
        const name = document.getElementById('buyer-name').value;
        const address = document.getElementById('buyer-address').value;
        const note = document.getElementById('order-note').value;
        if (!name || !address) return alert("Isi Nama dan Alamat dulu ya!");

        const sendSound = document.getElementById('soundSend');
        sendSound.currentTime = 0;
        sendSound.play().catch(e => {});

        let message = "🧾 *STRUK PESANAN MIMIFOOD*%0A%0A";
        message += `👤 *Nama:* ${name}%0A📍 *Alamat:* ${address}%0A%0A`;
        let total = 0;
        let hasItems = false;
        menuData.forEach(item => {
            if (cart[item.id] > 0) {
                const subtotal = item.price * cart[item.id];
                message += `• *${item.name}* (x${cart[item.id]}) = Rp ${subtotal.toLocaleString('id-ID')}%0A`;
                total += subtotal;
                hasItems = true;
            }
        });
        if (!hasItems) return alert("Pilih menu dulu ya!");
        if (note) message += `%0A📝 *Catatan:* ${note}%0A`;
        message += `%0A💰 *TOTAL PEMBAYARAN: Rp ${total.toLocaleString('id-ID')}*`;
        
        setTimeout(() => { window.open(`https://wa.me/6288211345402?text=${message}`); }, 500);
    }
    renderMenu();
</script>
</body>
</html>
