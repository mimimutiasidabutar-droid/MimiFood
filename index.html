<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MimiFood Bekasi - Daftar Menu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff5f5; margin: 0; padding: 20px; padding-bottom: 120px; }
        .header { text-align: center; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border: 2px solid #ff4d4d; }
        .header h1 { margin: 0; color: #d32f2f; font-size: 24px; }
        .menu-container { max-width: 500px; margin: auto; }
        .menu-item { background: white; padding: 12px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; border-left: 5px solid #ff4d4d; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .menu-img { width: 85px; height: 85px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #eee; }
        .menu-info { flex: 1; }
        .menu-info h3 { margin: 0; font-size: 15px; color: #444; }
        .menu-info p { margin: 5px 0; color: #d32f2f; font-weight: bold; font-size: 16px; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: #ff4d4d; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .qty { font-weight: bold; min-width: 20px; text-align: center; }
        
        .cart-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: auto; border-radius: 25px 25px 0 0; }
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 20px; font-weight: bold; color: #d32f2f; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 Daftar Menu MimiFood</h1>
    <p>Bekasi, Indonesia</p>
</div>

<div class="menu-container" id="menu-list"></div>

<div class="cart-footer">
    <div class="total-row">
        <span>Total Pesanan:</span>
        <span class="total-amount" id="total-display">Rp 0</span>
    </div>
    <button class="btn-wa" onclick="sendWA()">🚀 Kirim Pesanan ke WhatsApp</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="moneySound" src="https://www.myinstants.com/media/sounds/cash-register-purchase.mp3"></audio>

<script>
    const menuData = [
        { id: 1, name: "Pangsit Rebus Chili Oil", price: 10000, img: "pangsitrebus.png" },
        { id: 2, name: "Pangsit Goreng Chili Oil", price: 10000, img: "pangsitgoreng.png" },
        { id: 3, name: "Nasi Goreng Jengkol Spesial", price: 12000, img: "nasgorjengkol.png" },
        { id: 4, name: "Ayam Sambal Matah + Nasi", price: 18000, img: "ayamsambalmatah.png" },
        { id: 5, name: "Ayam Sambal Terasi + Nasi", price: 18000, img: "ayamsambalterasi.png" },
        { id: 6, name: "Tori No Teba + Nasi", price: 16000, img: "torinoteba.png" },
        { id: 7, name: "Nasi Bakar Cumi Balado", price: 12000, img: "nasicumi.png" },
        { id: 8, name: "Nasi Bakar Ayam Suwir Kemangi", price: 12000, img: "nasiayamsuwir.png" },
        { id: 9, name: "Bakcang Ayam Original", price: 8000, img: "bakcangori.png" },
        { id: 10, name: "Bakcang Ayam + Tetelan", price: 15000, img: "bakcangtetelan.png" }
    ];

    let cart = {};

    function renderMenu() {
        const container = document.getElementById('menu-list');
        container.innerHTML = menuData.map(item => `
            <div class="menu-item">
                <img src="${item.img}" class="menu-img">
                <div class="menu-info">
                    <h3>${item.name}</h3>
                    <p>Rp ${item.price.toLocaleString('id-ID')}</p>
                </div>
                <div class="controls">
                    <button class="btn-qty" onclick="updateQty(${item.id}, -1)">-</button>
                    <span class="qty" id="qty-${item.id}">0</span>
                    <button class="btn-qty" onclick="updateQty(${item.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function updateQty(id, change) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += change;
        if (cart[id] < 0) cart[id] = 0;
        document.getElementById(`qty-${id}`).innerText = cart[id];
        playEffect();
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        menuData.forEach(item => { if (cart[item.id]) total += item.price * cart[item.id]; });
        document.getElementById('total-display').innerText = "Rp " + total.toLocaleString('id-ID');
    }

    function playEffect() {
        const click = document.getElementById('clickSound');
        const money = document.getElementById('moneySound');
        click.volume = 1.0; money.volume = 1.0;
        click.currentTime = 0; click.play();
        setTimeout(() => { money.currentTime = 0; money.play(); }, 100);
    }

    function sendWA() {
        let message = "🧾 *PESANAN MIMIFOOD*%0A%0A";
        let total = 0;
        let hasItems = false;
        menuData.forEach(item => {
            if (cart[item.id] > 0) {
                const subtotal = item.price * cart[item.id];
                message += `• *${item.name}* (x${cart[item.id]}) = Rp ${subtotal.toLocaleString('id-ID')}%0A`;
                total += subtotal;
                hasItems = true;
            }
        });
        if (!hasItems) return alert("Pilih menu dulu ya!");
        message += `%0A*TOTAL: Rp ${total.toLocaleString('id-ID')}*%0A%0A📍 Alamat: `;
        window.open(`https://wa.me/6288211345402?text=${message}`);
    }
    renderMenu();
</script>
</body>
</html>
